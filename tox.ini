    pip
    setuptools==59.6.0
    {toxinidir}{/}plugins{/}aea-ci-helpers
allowlist_externals = pip
commands =
    pip install {toxinidir}[all]
    pip uninstall open-aea -y
    aea-ci check-imports

[testenv:plugins_env]
