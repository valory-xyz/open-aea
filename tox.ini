[testenv:bandit]
skipsdist = True
skip_install = True
deps =
    tomte[bandit]==0.6.5
commands = bandit -r aea benchmark examples \
           plugins/aea-ledger-fetchai/aea_ledger_fetchai \
           plugins/aea-ledger-ethereum/aea_ledger_ethereum \
           plugins/aea-ledger-ethereum-flashbots/aea-ledger-ethereum-flashbots \
           plugins/aea-ledger-cosmos/aea_ledger_cosmos \
           plugins/aea-ledger-solana/aea_ledger_solana \
           plugins/aea-cli-ipfs/aea_cli_ipfs
           bandit -s B101 -r packages
           bandit -s B101 -r tests scripts

[testenv:black]
skipsdist = True
skip_install = True
deps =
    tomte[black]==0.6.5
commands = black aea benchmark examples packages plugins scripts tests --exclude ".*_pb2.py"

[testenv:black-check]
skipsdist = True
skip_install = True
deps =
    tomte[black]==0.6.5
commands =black aea benchmark examples packages plugins scripts tests --check --verbose --exclude ".*_pb2.py"

[testenv:isort]
skipsdist = True
skip_install = True
deps =
    tomte[isort]==0.6.5
commands = isort aea benchmark examples packages plugins scripts tests

[testenv:isort-check]
skipsdist = True
skip_install = True
deps =
    tomte[isort]==0.6.5
commands = isort --check-only --verbose aea benchmark examples packages plugins scripts tests

[testenv:fix-copyright]
skipsdist = True
skip_install = True
deps =
    tomte[cli]==0.6.5
commands = tomte format-copyright --author "Valory AG" --author "Fetch.AI Limited" --scan-path aea --scan-path packages/fetchai/agents --scan-path packages/fetchai/connections --scan-path packages/fetchai/contracts --scan-path packages/fetchai/skills --scan-path packages/valory/connections --scan-path packages/open_aea/agents --scan-path tests --scan-path plugins --scan-path scripts --scan-path examples/ml_ex -e dummy_packages

[testenv:check-copyright]
skipsdist = True
skip_install = True
deps =
    tomte[cli]==0.6.5
commands = tomte check-copyright --author "Valory AG" --author "Fetch.AI Limited" --scan-path aea --scan-path packages/fetchai/agents --scan-path packages/fetchai/connections --scan-path packages/fetchai/contracts --scan-path packages/fetchai/skills --scan-path packages/valory/connections --scan-path packages/open_aea/agents --scan-path tests --scan-path plugins --scan-path scripts --scan-path examples/ml_ex -e dummy_packages


[testenv:hash-check]
skipsdist = True
usedevelop = True
commands =
    pip install {toxinidir}[all]
    python -m pip install --no-deps {toxinidir}/plugins/aea-cli-ipfs
    aea packages lock --check
    aea --registry-path=./tests/data/packages packages lock --check

[testenv:lock-packages]
skipsdist = True
usedevelop = True
commands =
    pip install {toxinidir}[all]
    python -m pip install --no-deps {toxinidir}/plugins/aea-cli-ipfs
    aea packages lock
    aea --registry-path=./tests/data/packages packages lock
    python -m pip install --no-deps {toxinidir}/plugins/aea-ci-helpers
    aea-ci check-doc-hashes --fix

[testenv:package-version-checks]
skipsdist = True
usedevelop = True
deps =
    {toxinidir}{/}plugins{/}aea-ci-helpers
commands =
    aea-ci check-pkg-versions

[testenv:package-dependencies-checks]
skipsdist = True
usedevelop = True
deps =
    {[testenv]deps}
    {[packages-deps]deps}
commands =
    python -m pip install --no-deps {toxinidir}/plugins/aea-ledger-ethereum
    python -m pip install --no-deps {toxinidir}/plugins/aea-ledger-ethereum-flashbots
    python -m pip install --no-deps {toxinidir}/plugins/aea-ledger-cosmos
    python -m pip install --no-deps {toxinidir}/plugins/aea-ledger-fetchai
    python -m aea.cli check-packages

[testenv:docs]
skipsdist = True
skip_install = True
deps =
    tomte[docs]==0.6.5
commands = pip3 install git+https://github.com/pugong/mkdocs-mermaid-plugin.git@abf1439#egg=mkdocs-mermaid-plugin
           mkdocs build --clean

[testenv:docs-serve]
skipsdist = True
skip_install = True
deps =
    tomte[docs]==0.6.5
commands = pip3 install git+https://github.com/pugong/mkdocs-mermaid-plugin.git@abf1439#egg=mkdocs-mermaid-plugin
           mkdocs build --clean
           python -c 'print("###### Starting local server. Press Control+C to stop server ######")'
           mkdocs serve -a localhost:8080

[testenv:flake8]
skipsdist = True
skip_install = True
deps =
    tomte[flake8]==0.6.5
commands = flake8 aea benchmark examples packages plugins scripts tests

[testenv:liccheck]
skipsdist = True
usedevelop = True
deps =
    setuptools==59.6.0
    liccheck==0.6.0
    tomte[cli]==0.6.5
commands = tomte freeze-dependencies --output-path {envtmpdir}/requirements.txt --exclude-package open-aea
           liccheck -s strategy.ini -r {envtmpdir}/requirements.txt -l PARANOID

[testenv:mypy]
skipsdist = True
skip_install = True
deps =
    tomte[mypy]==0.6.5
    types-requests==2.33.0.20260408
    {toxinidir}{/}plugins{/}aea-ci-helpers
commands = mypy aea packages --disallow-untyped-defs
           mypy benchmark examples --disallow-untyped-defs
           mypy scripts tests plugins/aea-ledger-fetchai/aea_ledger_fetchai plugins/aea-ledger-ethereum/aea_ledger_ethereum plugins/aea-ledger-ethereum-flashbots/aea_ledger_ethereum_flashbots plugins/aea-ledger-cosmos/aea_ledger_cosmos plugins/aea-cli-ipfs/aea_cli_ipfs

[testenv:pylint]
allowlist_externals =
    /bin/sh
    /usr/bin/sh
skipsdist = True
deps =
    tomte[pylint]==0.6.5
    requests==2.32.5
    urllib3==2.6.3
    certifi<=2022.6.15.1
commands =
    python -m pip install --no-deps {toxinidir}/plugins/aea-ledger-ethereum
    python -m pip install --no-deps {toxinidir}/plugins/aea-ledger-ethereum-flashbots
    python -m pip install --no-deps {toxinidir}/plugins/aea-ledger-cosmos
    python -m pip install --no-deps {toxinidir}/plugins/aea-ledger-fetchai
    python -m pip install --no-deps {toxinidir}/plugins/aea-ledger-solana
    python -m pip install --no-deps {toxinidir}/plugins/aea-cli-ipfs
    sh -c "pylint aea benchmark packages plugins/aea-ledger-fetchai/aea_ledger_fetchai plugins/aea-ledger-ethereum/aea_ledger_ethereum plugins/aea-ledger-ethereum-flashbots/aea_ledger_ethereum_flashbots plugins/aea-ledger-cosmos/aea_ledger_cosmos plugins/aea-cli-ipfs/aea_cli_ipfs scripts examples/*"

[testenv:safety]
skipsdist = True
skip_install = True
deps =
    tomte[safety]==v0.6.1
    typer==0.16.0
commands = safety check -i 37524 -i 38038 -i 37776 -i 38039 -i 39621 -i 40291 -i 39706 -i 51358 -i 51499 -i 67599 -i 70612

[testenv:vulture]
skipsdist = True
skip_install = True
deps =
    tomte[vulture]==0.6.5
commands = vulture aea scripts/whitelist.py --exclude "*_pb2.py"

[testenv:darglint]
skipsdist = True
skip_install = True
deps =
    tomte[darglint]==0.6.5
commands = darglint aea benchmark examples libs packages plugins scripts

[testenv:fix-doc-hashes]
skipsdist = True
usedevelop = True
deps =
    pip
    {toxinidir}{/}plugins{/}aea-ci-helpers
commands =
    aea-ci generate-pkg-list
    aea-ci check-doc-hashes --fix


[testenv:check-doc-links-hashes]
skipsdist = True
usedevelop = True
deps =
    pip
    setuptools==59.6.0
    tomte[cli]==0.6.5
    {toxinidir}{/}plugins{/}aea-ci-helpers
commands =
    tomte check-doc-links \
        -u "https://faucet.dimensions.network/" \
        -u "https://www.cs.ox.ac.uk/people/michael.wooldridge/" \
        -u "https://multiformats.io/multiaddr/" \
        -u "https://github.com/MarcoFavorito" \
        -u "https://github.com/valory-xyz/open-aea/branches/main/deploy-image" \
        -u "https://explore-stargateworld.fetch.ai/" \
        -u "https://explore-dorado.fetch.ai" \
        -u "https://rest-dorado.fetch.ai:443" \
        -u "https://www.python.org/dev/peps/pep-0426/name" \
        -u "https://rpc1.example.com" -u "https://rpc2.example.com" \
        -u "https://github.com/LedgerHQ/apduboy/blob/master/apduboy/lib/bip32.py" \
        -u "https://docs.optimism.io/builders/app-developers/transactions/estimates" \
        -u "https://docs.optimism.io/builders/app-developers/transactions/estimates\#l1-data-fee" \
        -n "http://www.fipa.org"
    aea-ci check-doc-hashes
    aea-ci check-ipfs-pushed


[testenv:generate-all-protocols]
skipsdist = True
usedevelop = True
deps =
    tomte[isort]==0.6.5
    tomte[black]==0.6.5
commands = pip install {toxinidir}[all]
           pip install --no-deps {toxinidir}/plugins/aea-cli-ipfs
