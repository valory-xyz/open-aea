# isort configuration for the protocol generator. Used by both
# `aea generate protocol` (single-protocol bootstrap) and
# `aea generate-all-protocols` (full regen) so the two emit identical
# formatting. Mirrors what the deleted `setup.cfg [isort]` shipped on
# main, which is the format the committed `packages/.../protocols/...`
# code reflects.
[isort]
profile=black
multi_line_output=3
include_trailing_comma=True
force_grid_wrap=0
use_parentheses=True
ensure_newline_before_comments = True
line_length=88
order_by_type=False
case_sensitive=True
lines_after_imports=-1
known_first_party=aea
known_packages=packages
known_local_folder=tests
sections=FUTURE,STDLIB,THIRDPARTY,FIRSTPARTY,PACKAGES,LOCALFOLDER
