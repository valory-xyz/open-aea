# open-aea `.gitleaks.toml` — extends the fleet canonical from `valory-xyz/open-autonomy`.
#
# The previous 1616-line forked copy was collapsed in Wave 2a so that
# every Valory repo derives the same secret-detection rules from a
# single canonical and only carries its own additions here.
#
# Until OA's Wave 2a (PR #2492) merges, the `[extend] path` below
# points at the branch ref to fetch the canonical during CI. Once that
# PR merges, repin to the canonical merge SHA:
#
#   path = "https://raw.githubusercontent.com/valory-xyz/open-autonomy/<MERGE_SHA>/.gitleaks.toml"
#
# TODO before merge: diff the original 1616-line `.gitleaks.toml` (the
# git history at HEAD~1) against the canonical and copy any OAEA-only
# allowlist regexes / paths into the `[allowlist]` block below.
# Acceptance gate: `gitleaks detect --config=.gitleaks.toml` reports
# the same findings as it did against the pre-collapse copy.

[extend]
path = "https://raw.githubusercontent.com/valory-xyz/open-autonomy/chore/cleanup-wave2a/.gitleaks.toml"

[allowlist]
description = "open-aea-specific additions on top of OA canonical"
regexes = [
    # IPFS CIDs (bafybei… 52 chars). Show up in package fingerprints
    # and protocol manifests; not secrets.
    '''bafybei[a-z2-7]{52}''',
]
